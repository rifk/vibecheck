name: deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build web distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon

      - name: Verify web artifact contents
        run: |
          set -euo pipefail
          dist_dir="composeApp/build/dist/wasmJs/productionExecutable"

          test -f "${dist_dir}/index.html"
          test -f "${dist_dir}/composeApp.js"
          test -d "${dist_dir}/composeResources"
          find "${dist_dir}" -maxdepth 1 -name '*.wasm' -print -quit | grep -q .

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: composeApp/build/dist/wasmJs/productionExecutable

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
